
openapi: 3.1.0
info:
  title: Hermes Courier Secure API
  version: 0.1.0
  description: Shared secure contract for the Hermes Courier Android and iOS apps.
servers:
  - url: https://gateway.hermes.local
tags:
  - name: auth
  - name: dashboard
  - name: sessions
  - name: approvals
  - name: events
  - name: skills
  - name: memory
  - name: cron
  - name: logs
components:
  securitySchemes:
    mutualTLS:
      type: mutualTLS
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DeviceIdentity:
      type: object
      additionalProperties: false
      required: [deviceId, platform, appVersion]
      properties:
        deviceId:
          type: string
        platform:
          type: string
          enum: [android, ios]
        appVersion:
          type: string
        publicKeyFingerprint:
          type: string
    AuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [device]
      properties:
        device:
          $ref: '#/components/schemas/DeviceIdentity'
        nonce:
          type: string
    AuthChallengeResponse:
      type: object
      additionalProperties: false
      required: [challengeId, nonce, expiresAt, trustLevel]
      properties:
        challengeId:
          type: string
        nonce:
          type: string
        expiresAt:
          type: string
          format: date-time
        trustLevel:
          type: string
          enum: [restricted, trusted, elevated]
    AuthResponseRequest:
      type: object
      additionalProperties: false
      required: [challengeId, signedNonce, device]
      properties:
        challengeId:
          type: string
        signedNonce:
          type: string
        device:
          $ref: '#/components/schemas/DeviceIdentity'
    AuthSession:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, expiresAt, gatewayUrl, sessionId]
      properties:
        sessionId:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        gatewayUrl:
          type: string
          format: uri
        mtlsRequired:
          type: boolean
        scope:
          type: array
          items:
            type: string
    DashboardSnapshot:
      type: object
      additionalProperties: false
      required: [activeSessionCount, pendingApprovalCount, lastSyncLabel, connectionState]
      properties:
        activeSessionCount:
          type: integer
        pendingApprovalCount:
          type: integer
        lastSyncLabel:
          type: string
        connectionState:
          type: string
    SessionSummary:
      type: object
      additionalProperties: false
      required: [sessionId, title, status, updatedAt]
      properties:
        sessionId:
          type: string
        title:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    ApprovalSummary:
      type: object
      additionalProperties: false
      required: [approvalId, title, detail, requiresBiometrics]
      properties:
        approvalId:
          type: string
        title:
          type: string
        detail:
          type: string
        requiresBiometrics:
          type: boolean
    ConversationEvent:
      type: object
      additionalProperties: false
      required: [eventId, author, body, timestamp]
      properties:
        eventId:
          type: string
        author:
          type: string
        body:
          type: string
        timestamp:
          type: string
          format: date-time
    SessionControlRequest:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          description: Normalized control verb (e.g. pause, resume, terminate).
    SessionControlActionResult:
      type: object
      additionalProperties: false
      required: [sessionId, action, status, detail, updatedAt]
      properties:
        sessionId:
          type: string
        action:
          type: string
        status:
          type: string
        detail:
          type: string
        updatedAt:
          type: string
        endpoint:
          type: string
          description: Which gateway path handled the action, when known.
        supported:
          type: boolean
          description: False when no compatible gateway route exists for this action.
    ApprovalActionResult:
      type: object
      additionalProperties: false
      required: [approvalId, action, status, detail, updatedAt]
      properties:
        approvalId:
          type: string
        action:
          type: string
        status:
          type: string
        detail:
          type: string
        updatedAt:
          type: string
    UnavailablePayload:
      type: object
      description: >
        Shared shape gateways return when a feature is not implemented yet.
        Clients must treat `supported: false` as terminal — they must not retry,
        regardless of `retryable`. If `fallbackPollEndpoints` is present, clients
        may substitute those routes for equivalent data.
      additionalProperties: true
      required: [type, supported, detail]
      properties:
        type:
          type: string
          description: Stable identifier for the unavailable capability (e.g. `events_unavailable`, `skills_unavailable`).
        supported:
          type: boolean
        detail:
          type: string
        endpoint:
          type: string
        retryable:
          type: boolean
        fallbackPollEndpoints:
          type: array
          items:
            type: string
    Skill:
      type: object
      additionalProperties: false
      required: [skillId, name, enabled]
      properties:
        skillId:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        version:
          type: string
        lastUsedAt:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
    MemoryItem:
      type: object
      additionalProperties: false
      required: [memoryId, title, updatedAt]
      properties:
        memoryId:
          type: string
        title:
          type: string
        snippet:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
        pinned:
          type: boolean
    CronJob:
      type: object
      additionalProperties: false
      required: [cronId, name, schedule, enabled]
      properties:
        cronId:
          type: string
        name:
          type: string
        schedule:
          type: string
          description: Human-readable schedule expression (cron string or natural-language).
        enabled:
          type: boolean
        description:
          type: string
        nextRunAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        lastStatus:
          type: string
          description: Freeform short label (`ok`, `failed`, `skipped`, etc.).
    LogEntry:
      type: object
      additionalProperties: false
      required: [logId, severity, timestamp, message]
      properties:
        logId:
          type: string
        severity:
          type: string
          description: One of `debug`, `info`, `warn`, `error`; case-insensitive.
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        source:
          type: string
        sessionId:
          type: string
    RealtimeEventEnvelope:
      type: object
      description: >
        WebSocket (or SSE) JSON frames. Clients tolerate optional fields; gateway may send
        partial snapshots on each frame.
      additionalProperties: true
      properties:
        type:
          type: string
        kind:
          type: string
        eventId:
          type: string
        timestamp:
          type: string
        dashboard:
          $ref: '#/components/schemas/DashboardSnapshot'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalSummary'
        conversation:
          $ref: '#/components/schemas/ConversationEvent'
        event:
          $ref: '#/components/schemas/ConversationEvent'
        approvalResult:
          $ref: '#/components/schemas/ApprovalActionResult'
        approval_action:
          $ref: '#/components/schemas/ApprovalActionResult'
        sessionControlResult:
          $ref: '#/components/schemas/SessionControlActionResult'
        session_control_action:
          $ref: '#/components/schemas/SessionControlActionResult'
security:
  - mutualTLS: []
  - bearerAuth: []
paths:
  /v1/auth/challenge:
    post:
      tags: [auth]
      summary: Request a device-bound authentication challenge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
  /v1/auth/response:
    post:
      tags: [auth]
      summary: Complete challenge-response bootstrap and mint a short-lived session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponseRequest'
      responses:
        '200':
          description: Session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /v1/dashboard:
    get:
      tags: [dashboard]
      summary: Fetch the current control-room snapshot.
      responses:
        '200':
          description: Dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSnapshot'
  /v1/sessions:
    get:
      tags: [sessions]
      summary: List current and historical Hermes sessions.
      responses:
        '200':
          description: Session summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'
  /v1/sessions/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [sessions]
      summary: Fetch a single session summary (same shape as list entries).
      responses:
        '200':
          description: Session summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSummary'
  /v1/sessions/{sessionId}/actions:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [sessions]
      summary: >
        Preferred session-control endpoint. Body uses SessionControlRequest.action
        (pause, resume, terminate). Gateways may also accept POST /v1/sessions/{sessionId}/{action} with an empty body.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionControlRequest'
      responses:
        '200':
          description: Result of the control action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionControlActionResult'
        '204':
          description: Action accepted without a parsed body.
  /v1/sessions/{sessionId}/{action}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      - name: action
        in: path
        required: true
        schema:
          type: string
          description: Same verbs as SessionControlRequest.action (pause, resume, terminate).
    post:
      tags: [sessions]
      summary: Alternate session-control style (empty JSON body). Clients try this if /actions returns 404/405.
      responses:
        '200':
          description: Result or empty body when accepted.
        '204':
          description: Action accepted.
  /v1/approvals:
    get:
      tags: [approvals]
      summary: List pending approvals.
      responses:
        '200':
          description: Approval summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalSummary'
  /v1/conversation:
    get:
      tags: [dashboard]
      summary: Recent conversation events for the dashboard companion feed.
      responses:
        '200':
          description: Conversation events (newest may be last or first depending on gateway; clients accept an array).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationEvent'
    post:
      tags: [dashboard]
      summary: Submit an instruction into the live conversation stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                body:
                  type: string
                  description: Instruction or chat message to send.
              required: [body]
      responses:
        '200':
          description: Conversation event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationEvent'
        '204':
          description: Instruction accepted without a response body.
  /v1/approvals/{approvalId}/decision:
    post:
      tags: [approvals]
      summary: Approve or deny a pending action.
      parameters:
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, deny]
                reason:
                  type: string
      responses:
        '204':
          description: Decision recorded.
  /v1/events:
    get:
      tags: [events]
      summary: Live events stream. Mobile clients typically open a WebSocket to this path; some gateways may expose SSE on the same route.
      responses:
        '200':
          description: Stream established (SSE) or WebSocket upgrade negotiated per gateway.
        '426':
          description: >
            Gateway declined the WebSocket upgrade. Body follows `UnavailablePayload`
            with `type: events_unavailable`. Clients must stop retrying when
            `supported: false`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnavailablePayload'
  /v1/skills:
    get:
      tags: [skills]
      summary: List of skills / tools / capabilities exposed by the agent.
      description: >
        Read-only in this contract. Gateways that have not implemented skills
        yet should respond with `UnavailablePayload` (type `skills_unavailable`)
        and HTTP 200 or 501; clients render an "unsupported" state.
      responses:
        '200':
          description: Skills list (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Skill'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Gateway does not implement /v1/skills. Clients treat as unsupported.
        '501':
          description: Gateway returns an `UnavailablePayload` with `supported:false`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnavailablePayload'
  /v1/skills/{skillId}:
    parameters:
      - name: skillId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [skills]
      summary: Full skill detail.
      responses:
        '200':
          description: Skill detail (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Skill'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Unknown skill or gateway does not implement skills.
  /v1/memory:
    get:
      tags: [memory]
      summary: Recent memory entries for operator review.
      description: Read-only. Unsupported gateways follow the `UnavailablePayload` pattern.
      responses:
        '200':
          description: Memory entries (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/MemoryItem'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Gateway does not implement /v1/memory.
  /v1/memory/{memoryId}:
    parameters:
      - name: memoryId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [memory]
      summary: Full memory item detail.
      responses:
        '200':
          description: Memory item (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MemoryItem'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Unknown memory or gateway does not implement memory.
  /v1/cron:
    get:
      tags: [cron]
      summary: Scheduled task list.
      description: Read-only. Unsupported gateways follow the `UnavailablePayload` pattern.
      responses:
        '200':
          description: Cron jobs (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/CronJob'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Gateway does not implement /v1/cron.
  /v1/cron/{cronId}:
    parameters:
      - name: cronId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [cron]
      summary: Cron job detail.
      responses:
        '200':
          description: Cron job (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CronJob'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Unknown job or gateway does not implement cron.
  /v1/logs:
    get:
      tags: [logs]
      summary: Recent log / activity entries.
      description: Read-only. Unsupported gateways follow the `UnavailablePayload` pattern.
      parameters:
        - name: limit
          in: query
          required: false
          description: Optional upper bound on the number of entries returned (gateway may clamp).
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: severity
          in: query
          required: false
          description: Optional severity filter (`debug|info|warn|error`).
          schema:
            type: string
      responses:
        '200':
          description: Log entries (or `UnavailablePayload`).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/LogEntry'
                  - $ref: '#/components/schemas/UnavailablePayload'
        '404':
          description: Gateway does not implement /v1/logs.
