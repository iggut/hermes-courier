name: Android On-Demand Build

on:
  workflow_dispatch:
    inputs:
      build_task:
        description: Gradle task to run
        required: true
        default: :app:assembleDebug
        type: choice
        options:
          - :app:assembleDebug
          - :app:bundleDebug

permissions:
  contents: read

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build Android app
        working-directory: android
        run: ./gradlew ${{ inputs.build_task }} --no-daemon

      - name: Upload debug APK
        if: ${{ inputs.build_task == ':app:assembleDebug' }}
        uses: actions/upload-artifact@v4
        with:
          name: hermes-courier-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload debug bundle
        if: ${{ inputs.build_task == ':app:bundleDebug' }}
        uses: actions/upload-artifact@v4
        with:
          name: hermes-courier-debug-bundle
          path: android/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
