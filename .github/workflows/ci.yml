name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [push, pull_request]

permissions:
  contents: read

jobs:
  android-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v5

      - name: Contract path parity (YAML vs clients)
        run: ./scripts/check-contract-paths.sh

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Android JVM unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

  ios-unit-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Contract path parity (YAML vs clients)
        run: ./scripts/check-contract-paths.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project and run unit tests
        working-directory: ios
        run: |
          xcodegen generate
          DESTINATION="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          if [[ -z "$DESTINATION" ]]; then
            echo "No available iPhone simulator found on runner."
            exit 1
          fi
          echo "Using simulator id: $DESTINATION"
          xcodebuild \
            -project HermesCourier.xcodeproj \
            -scheme HermesCourier \
            -destination "id=$DESTINATION" \
            -only-testing:HermesCourierTests \
            test
