
name: HermesCourier
options:
  bundleIdPrefix: com.hermescourier
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.hermescourier.app
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

targets:
  HermesCourier:
    type: application
    platform: iOS
    sources:
      - path: HermesCourierApp/Sources
    resources:
      - path: HermesCourierApp/Resources
    info:
      path: HermesCourierApp/Info.plist
      properties:
        CFBundleDisplayName: Hermes Courier
        UILaunchScreen: {}

  HermesCourierTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HermesCourierTests
    resources:
      - path: HermesCourierTests/Resources
    dependencies:
      - target: HermesCourier
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
